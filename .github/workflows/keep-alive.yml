name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 자정 실행 (UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}"
